name: Deploy NewWords.Api to production

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  SERVICE_NAME: new-words-api.service

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test NewWords.Api.sln --configuration Release --no-build

  build-and-deploy:
    needs: test
    # Production deploy is gated behind a deliberate manual dispatch (issue #46):
    # a push/merge to master runs the `test` job only, so merging code no longer
    # restarts prod or applies DB migrations. Ship prod by running this workflow
    # from the Actions tab (Run workflow), which triggers the full pipeline below
    # — migrations + restart + post-restart crash-loop health check.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: |
          dotnet publish --configuration Release --output ./publish
          # Ship the migration scripts + runner so the deploy can apply pending
          # DB migrations on the VPS before the service restart (issue #41).
          cp -r migration_scripts ./publish/migration_scripts
          sed -i "s/PRODUCTION_MYSQL_PASSWORD/${{ secrets.PRODUCTION_MYSQL_PASSWORD }}/g" ./publish/appsettings.json
          sed -i "s/PRODUCTION_SYMMETRIC_SECURITY_KEY/${{ secrets.PRODUCTION_SYMMETRIC_SECURITY_KEY }}/g" ./publish/appsettings.json
          sed -i "s|PRODUCTION_REDIS_CONNECTION|${{ secrets.PRODUCTION_REDIS_CONNECTION }}|g" ./publish/appsettings.json
          sed -i "s/XAI_API_KEY/${{ secrets.XAI_API_KEY }}/g" ./publish/appsettings.json
          sed -i "s/OPENAI_API_KEY/${{ secrets.OPENAI_API_KEY }}/g" ./publish/appsettings.json
          COMMIT_HASH=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          VERSION_INFO="$COMMIT_HASH ($BUILD_DATE)"
          sed -i "s/VERSION_PLACEHOLDER/$VERSION_INFO/" ./publish/appsettings.json

      - name: Create SSH key file
        run: |
          mkdir -p $HOME/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > $HOME/.ssh/id_ed25519
          chmod 600 $HOME/.ssh/id_ed25519
          # Optional: Add known hosts to avoid fingerprint prompts
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> $HOME/.ssh/known_hosts
          # Add debugging information
          echo "=== SSH Directory Contents ==="
          ls -la $HOME/.ssh/
          echo "=== Key File Size ==="
          stat -c %s $HOME/.ssh/id_ed25519
          echo "=== First line of key file (safe to show) ==="
          head -n 1 $HOME/.ssh/id_ed25519
          echo "Current directory: $(pwd)"
          echo "Home directory: $HOME"

      - name: Deploy to production and replace placeholders - prepare directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key_path: /home/runner/.ssh/id_ed25519
          port: ${{ secrets.SSH_PORT }}
          script: |
            mkdir -p ${{ secrets.DEPLOY_PATH }}

      - name: Copy files to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key_path: /home/runner/.ssh/id_ed25519
          port: ${{ secrets.SSH_PORT }}
          source: "publish/*"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1

      - name: Apply DB migrations
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key_path: /home/runner/.ssh/id_ed25519
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Apply pending migration_scripts/*.sql BEFORE the restart so the new
            # code never starts against a stale schema (issue #41). The runner is
            # idempotent (ledger-tracked) and reads DB creds from the deployed
            # appsettings.json; a non-zero exit fails the deploy before restart.
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            chmod +x migration_scripts/apply_migrations.sh
            bash migration_scripts/apply_migrations.sh

      - name: Create/Update systemd service file and start the service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key_path: /home/runner/.ssh/id_ed25519
          port: ${{ secrets.SSH_PORT }}
          script: |
            printf "%s\n" "[Unit]" \
              "Description=NewWords Api" \
              "After=network.target" \
              "" \
              "[Service]" \
              "Type=simple" \
              "User=${{ secrets.SSH_USERNAME }}" \
              "WorkingDirectory=${{ secrets.DEPLOY_PATH }}" \
              "ExecStart=/home/ubuntu/dotnet/dotnet ${{ secrets.DEPLOY_PATH }}/NewWords.Api.dll" \
              "Restart=always" \
              "RestartSec=10" \
              "SyslogIdentifier=dotnet-app" \
              "Environment=ASPNETCORE_ENVIRONMENT=Production" \
              "" \
              "[Install]" \
              "WantedBy=multi-user.target" > /tmp/${{ env.SERVICE_NAME }}
            sudo mv /tmp/${{ env.SERVICE_NAME }} /etc/systemd/system/${{ env.SERVICE_NAME }}
            sudo chown root:root /etc/systemd/system/${{ env.SERVICE_NAME }}
            sudo systemctl daemon-reload
            sudo systemctl enable ${{ env.SERVICE_NAME }}
            sudo systemctl restart ${{ env.SERVICE_NAME }}

      - name: Verify service health after restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key_path: /home/runner/.ssh/id_ed25519
          port: ${{ secrets.SSH_PORT }}
          script: |
            # A crash-looping process (e.g. a startup throw under Restart=always /
            # RestartSec=10) otherwise leaves the deploy green. Manual restarts do NOT
            # increment NRestarts; only systemd's own auto-restarts under Restart= do,
            # so a rising NRestarts within the window is a definitive crash-loop signal.
            # Watch for a window comfortably longer than RestartSec so a single
            # auto-restart is guaranteed to land inside it. systemctl-based (no HTTP
            # port / reverse-proxy assumption).
            SERVICE=${{ env.SERVICE_NAME }}
            echo "Verifying $SERVICE stays healthy after deploy..."
            baseline=$(systemctl show -p NRestarts --value "$SERVICE")
            echo "Baseline NRestarts=$baseline"
            i=0
            while [ "$i" -lt 6 ]; do
              sleep 3
              i=$((i + 1))
              state=$(systemctl is-active "$SERVICE" || true)
              current=$(systemctl show -p NRestarts --value "$SERVICE")
              echo "  [$((i * 3))s] is-active=$state NRestarts=$current"
              if [ "$current" != "$baseline" ]; then
                echo "ERROR: $SERVICE auto-restarted during the monitoring window (crash-loop)."
                sudo journalctl -u "$SERVICE" -n 100 --no-pager || true
                sudo systemctl status "$SERVICE" --no-pager || true
                exit 1
              fi
            done
            final=$(systemctl is-active "$SERVICE" || true)
            if [ "$final" != "active" ]; then
              echo "ERROR: $SERVICE is not active after the monitoring window (state=$final)."
              sudo journalctl -u "$SERVICE" -n 100 --no-pager || true
              sudo systemctl status "$SERVICE" --no-pager || true
              exit 1
            fi
            echo "OK: $SERVICE stayed active with no auto-restarts for $((i * 3))s."
